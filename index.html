<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  .gnj-cat-strip::-webkit-scrollbar{display:none;}
  .gnj-link:hover{color:#7A5CFF !important;}
  .gnj-cta:hover{transform:translateY(-2px); box-shadow:0 16px 34px rgba(109,94,224,.52) !important;}
  .gnj-field:focus{border-color:#2563FF !important; box-shadow:0 0 0 4px rgba(37,99,255,.12);}
</style>
</helmet>

<div style="position:relative; font-family:'Inter',system-ui,-apple-system,sans-serif;">
  <div style="position:sticky; top:0; z-index:300; padding:16px 12px 0;">
    <div style="width:fit-content; max-width:100%; margin:0 auto; height:64px; display:flex; align-items:center; gap:16px; padding:0 14px 0 22px; border-radius:20px; background:rgba(255,255,255,0.9); backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,0.7); box-shadow:0 14px 40px rgba(36,40,90,0.12);">
      <a href="index.html" style="display:flex; align-items:center; text-decoration:none; flex-shrink:0;">
<img src="uploads/f1-logo-transparent2.png" alt="F1" style="height:32px; width:auto; display:block;">
      </a>
      <div style="position:relative; min-width:0;">
        <div class="gnj-cat-strip" style="display:flex; align-items:center; gap:8px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;">
          <sc-for list="{{ cats }}" as="cat" hint-placeholder-count="5">
            <a href="{{ cat.href }}" class="gnj-link" style="flex-shrink:0; display:inline-flex; align-items:center; padding:9px 13px; border-radius:999px; white-space:nowrap; font-weight:700; font-size:13.5px; color:#0B1437; background:rgba(255,255,255,0.75); border:1px solid #E6ECF7; text-decoration:none;">{{ cat.label }}</a>
          </sc-for>
        </div>
      </div>
      <button type="button" onClick="{{ openQuote }}" class="gnj-cta" style="display:flex; align-items:center; gap:9px; background:linear-gradient(135deg,#9b8cf2 0%,#6d5ee0 100%); color:#fff; border:none; border-radius:14px; padding:12px 20px; font-family:inherit; font-size:13.5px; font-weight:700; cursor:pointer; box-shadow:0 10px 24px rgba(109,94,224,0.4); white-space:nowrap; flex-shrink:0;">
        <i class="ph ph-calendar-check" style="font-size:16px;"></i> Termin buchen
      </button>
    </div>
  </div>

  <!-- ===== Kostenlose Anfrage — shared request wizard ===== -->
  <div style="{{ overlayStyle }}" onClick="{{ closeQuote }}"></div>
  <div style="{{ dialogStyle }}" onClick="{{ stop }}">
    <button type="button" onClick="{{ closeQuote }}" aria-label="Schließen" style="position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%; border:1px solid #E6ECF7; background:#fff; font-size:18px; line-height:1; color:#6B7794; cursor:pointer; z-index:2;">&times;</button>
    <div style="padding:26px 28px 14px;">
      <h3 style="font-size:22px; font-weight:800; letter-spacing:-.3px; color:#0B1437; margin:0;">Kostenlose Anfrage</h3>
      <p style="color:#45506E; font-size:14px; margin-top:4px;">{{ stepSub }}</p>
      <div style="height:6px; border-radius:999px; background:#EEF1FB; margin-top:16px; overflow:hidden;"><span style="{{ progStyle }}"></span></div>
    </div>

    <div style="padding:4px 28px; flex:1; overflow-y:auto;">
      <sc-if value="{{ isStepService }}" hint-placeholder-val="{{ true }}">
        <div>
          <label style="display:block; font-size:13.5px; font-weight:700; color:#0B1437; margin:14px 0 7px;">Was können wir für Sie tun?</label>
          <select class="gnj-field" value="{{ service }}" onChange="{{ onServiceChange }}" style="width:100%; padding:12px 14px; border:1px solid #E6ECF7; border-radius:10px; font-family:inherit; font-size:15px; color:#0B1437; background:#fff; outline:none;">
            <option value="">Bitte wählen …</option>
            <sc-for list="{{ serviceOptions }}" as="opt" hint-placeholder-count="7">
              <option value="{{ opt.value }}">{{ opt.label }}</option>
            </sc-for>
          </select>
        </div>
      </sc-if>

      <sc-if value="{{ isStepContact }}" hint-placeholder-val="{{ false }}">
        <div>
          <label style="display:block; font-size:13.5px; font-weight:700; color:#0B1437; margin:14px 0 7px;">Ihr Name</label>
          <input class="gnj-field" type="text" placeholder="Vor- und Nachname" value="{{ name }}" onInput="{{ onNameChange }}" style="width:100%; padding:12px 14px; border:1px solid #E6ECF7; border-radius:10px; font-family:inherit; font-size:15px; color:#0B1437; outline:none;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label style="display:block; font-size:13.5px; font-weight:700; color:#0B1437; margin:14px 0 7px;">E-Mail</label>
              <input class="gnj-field" type="email" placeholder="name@firma.de" value="{{ email }}" onInput="{{ onEmailChange }}" style="width:100%; padding:12px 14px; border:1px solid #E6ECF7; border-radius:10px; font-family:inherit; font-size:15px; color:#0B1437; outline:none;">
            </div>
            <div>
              <label style="display:block; font-size:13.5px; font-weight:700; color:#0B1437; margin:14px 0 7px;">Telefon</label>
              <input class="gnj-field" type="tel" placeholder="030 …" value="{{ phone }}" onInput="{{ onPhoneChange }}" style="width:100%; padding:12px 14px; border:1px solid #E6ECF7; border-radius:10px; font-family:inherit; font-size:15px; color:#0B1437; outline:none;">
            </div>
          </div>
          <label style="display:block; font-size:13.5px; font-weight:700; color:#0B1437; margin:14px 0 7px;">Worum geht es? (optional)</label>
          <textarea class="gnj-field" rows="3" placeholder="Kurze Beschreibung Ihres Anliegens …" value="{{ message }}" onInput="{{ onMessageChange }}" style="width:100%; padding:12px 14px; border:1px solid #E6ECF7; border-radius:10px; font-family:inherit; font-size:15px; color:#0B1437; outline:none; resize:vertical;"></textarea>
        </div>
      </sc-if>

      <sc-if value="{{ isStepSummary }}" hint-placeholder-val="{{ false }}">
        <div style="border:1px solid #E6ECF7; border-radius:14px; padding:6px 18px; margin:14px 0;">
          <div style="display:flex; justify-content:space-between; gap:14px; padding:10px 0; border-bottom:1px solid #E6ECF7; font-size:14px;"><span style="color:#6B7794;">Leistung</span><b style="color:#0B1437;">{{ serviceLabel }}</b></div>
          <div style="display:flex; justify-content:space-between; gap:14px; padding:10px 0; border-bottom:1px solid #E6ECF7; font-size:14px;"><span style="color:#6B7794;">Name</span><b style="color:#0B1437;">{{ name }}</b></div>
          <div style="display:flex; justify-content:space-between; gap:14px; padding:10px 0; border-bottom:1px solid #E6ECF7; font-size:14px;"><span style="color:#6B7794;">E-Mail</span><b style="color:#0B1437;">{{ email }}</b></div>
          <div style="display:flex; justify-content:space-between; gap:14px; padding:10px 0; font-size:14px;"><span style="color:#6B7794;">Telefon</span><b style="color:#0B1437;">{{ phoneDisplay }}</b></div>
        </div>
      </sc-if>

      <sc-if value="{{ isStepDone }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center; padding:24px 0;">
          <div style="width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; background:linear-gradient(120deg,#2563FF 0%,#7A5CFF 55%,#21D4FD 100%); color:#fff; font-size:28px; box-shadow:0 12px 26px rgba(37,99,255,.3);">✓</div>
          <h4 style="font-size:20px; font-weight:800; color:#0B1437; margin:0;">Vielen Dank!</h4>
          <p style="color:#45506E; margin-top:6px;">Ihre Anfrage ist bereit. Wir melden uns schnellstmöglich bei Ihnen.</p>
        </div>
      </sc-if>
    </div>

    <div style="color:#F04438; font-size:13px; font-weight:600; padding:0 28px; min-height:18px;">{{ errMsg }}</div>
    <div style="display:flex; justify-content:space-between; gap:12px; padding:10px 28px 24px;">
      <button type="button" onClick="{{ back }}" style="{{ backBtnStyle }}">Zurück</button>
      <button type="button" onClick="{{ next }}" style="background:#2563FF; color:#fff; border:none; border-radius:10px; padding:11px 22px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;">{{ nextLabel }}</button>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:64}}">
class Component extends DCLogic {
  cats = [
    { label: 'Website & Web', href: 'Website-Web.dc.html' },
    { label: 'ERP & CRM', href: 'ERP-CRM.dc.html' },
    { label: 'Server & Infrastruktur', href: 'IT-Infrastruktur.dc.html' },
    { label: 'Cloud & KI', href: 'Cloud-KI.dc.html' },
    { label: 'IT Support', href: 'IT-Support.dc.html' },
  ];
  serviceOptions = [
    { value: 'website', label: 'Website-Erstellung' },
    { value: 'erp', label: 'ERP-System' },
    { value: 'crm', label: 'CRM-System' },
    { value: 'server', label: 'Server & Infrastruktur' },
    { value: 'cloud', label: 'Cloud Migration' },
    { value: 'support', label: 'IT-Support' },
    { value: 'ki', label: 'KI & Automatisierung' },
    { value: 'other', label: 'Sonstiges' },
  ];

  state = { open: false, step: 0, service: '', name: '', email: '', phone: '', message: '', errMsg: '' };

  openQuote = () => this.setState({ open: true, step: 0, errMsg: '' });
  closeQuote = () => this.setState({ open: false });
  stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };
  onServiceChange = (e) => this.setState({ service: e.target.value, errMsg: '' });
  onNameChange = (e) => this.setState({ name: e.target.value, errMsg: '' });
  onEmailChange = (e) => this.setState({ email: e.target.value, errMsg: '' });
  onPhoneChange = (e) => this.setState({ phone: e.target.value, errMsg: '' });
  onMessageChange = (e) => this.setState({ message: e.target.value });

  _emailOk(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v || ''); }

  back = () => this.setState(s => ({ step: Math.max(0, s.step - 1), errMsg: '' }));

  _sendMail() {
    const s = this.state;
    const svc = (this.serviceOptions.find(o => o.value === s.service) || {}).label || 'Anfrage';
    const lines = [
      'Leistung: ' + svc,
      s.message ? ('Nachricht: ' + s.message) : '',
      '',
      'Name: ' + s.name,
      'E-Mail: ' + s.email,
      'Telefon: ' + (s.phone || '-'),
    ].filter(Boolean);
    const url = 'mailto:info@firma.de?subject=' + encodeURIComponent('Anfrage: ' + svc) + '&body=' + encodeURIComponent(lines.join('\n'));
    try { window.location.href = url; } catch (e) {}
  }

  next = () => {
    const s = this.state;
    if (s.step === 0) {
      if (!s.service) { this.setState({ errMsg: 'Bitte wählen Sie eine Leistung aus.' }); return; }
      this.setState({ step: 1, errMsg: '' });
    } else if (s.step === 1) {
      if (!s.name.trim()) { this.setState({ errMsg: 'Bitte geben Sie Ihren Namen an.' }); return; }
      if (!this._emailOk(s.email)) { this.setState({ errMsg: 'Bitte geben Sie eine gültige E-Mail-Adresse an.' }); return; }
      this.setState({ step: 2, errMsg: '' });
    } else if (s.step === 2) {
      this._sendMail();
      this.setState({ step: 3, errMsg: '' });
    } else {
      this.setState({ open: false });
    }
  };

  renderVals() {
    const s = this.state;
    const subs = ['Erzählen Sie uns kurz, worum es geht.', 'Wie können wir Sie erreichen?', 'Bitte prüfen Sie Ihre Angaben.', 'Anfrage abgeschlossen.'];
    const svcLabel = (this.serviceOptions.find(o => o.value === s.service) || {}).label || '–';
    const baseBtn = 'background:#fff; color:#0B1437; border:1px solid #E6ECF7; border-radius:10px; padding:11px 22px; font-family:inherit; font-size:15px; font-weight:600; cursor:pointer;';
    return {
      cats: this.cats,
      serviceOptions: this.serviceOptions,
      openQuote: this.openQuote, closeQuote: this.closeQuote, stop: this.stop,
      overlayStyle: 'position:fixed; inset:0; z-index:1000; background:rgba(11,20,55,.55); backdrop-filter:blur(3px); display:' + (s.open ? 'block' : 'none') + ';',
      dialogStyle: 'position:fixed; z-index:1001; top:40px; left:50%; transform:translateX(-50%); max-width:560px; width:calc(100% - 32px); max-height:calc(100vh - 80px); overflow:auto; background:#fff; border-radius:20px; box-shadow:0 30px 80px rgba(20,40,110,.25); display:' + (s.open ? 'flex' : 'none') + '; flex-direction:column;',
      stepSub: subs[s.step] || '',
      progStyle: 'display:block; height:100%; width:' + ((s.step + 1) / 4 * 100) + '%; background:linear-gradient(120deg,#2563FF 0%,#7A5CFF 55%,#21D4FD 100%); border-radius:999px; transition:width .3s ease;',
      isStepService: s.step === 0, isStepContact: s.step === 1, isStepSummary: s.step === 2, isStepDone: s.step === 3,
      service: s.service, onServiceChange: this.onServiceChange,
      name: s.name, onNameChange: this.onNameChange,
      email: s.email, onEmailChange: this.onEmailChange,
      phone: s.phone, onPhoneChange: this.onPhoneChange,
      message: s.message, onMessageChange: this.onMessageChange,
      serviceLabel: svcLabel, phoneDisplay: s.phone || '–',
      errMsg: s.errMsg,
      back: this.back, next: this.next,
      backBtnStyle: baseBtn + (s.step > 0 && s.step < 3 ? '' : 'visibility:hidden;'),
      nextLabel: s.step === 2 ? 'Anfrage senden' : (s.step === 3 ? 'Schließen' : 'Weiter'),
    };
  }
}
</script>
</body>
</html>
