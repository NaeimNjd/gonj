function renderDialer(){

function dpStartCall(){if(state.callState!=='idle')return;state.callState='ringing';state.callSeconds=0;state.muted=false;state.held=false;clearTimeout(window._dpRt);clearInterval(window._dpTimer);render();
  window._dpRt=setTimeout(function(){state.callState='connected';render();window._dpTimer=setInterval(function(){state.callSeconds++;var el=document.querySelector('main');if(state.view==='dialer')render();},1000);},1400);}
function dpHangup(){clearTimeout(window._dpRt);clearInterval(window._dpTimer);state.callState='idle';state.callSeconds=0;state.held=false;render();}
function dpToggleMute(){state.muted=!state.muted;render();}
function dpToggleHold(){state.held=!state.held;render();}
function dpEndCall(key){
  clearTimeout(window._dpRt);clearInterval(window._dpTimer);
  var lead=leads[state.currentIndex];
  var labelMap={termin:'Termin vereinbart',interesse:'Qualifiziert',rueckruf:'Rückruf',kein:'Kein Interesse',nicht:'Nicht erreicht',mailbox:'Rückruf'};
  var iconMap={termin:['calendar-check','#12B76A'],interesse:['thumbs-up','#2563FF'],rueckruf:['arrow-counter-clockwise','#F0913A'],kein:['hand-palm','#6B7794'],nicht:['phone-x','#F04438'],mailbox:['voicemail','#7A5CFF']};
  edits[lead.id]=edits[lead.id]||{};edits[lead.id].status=labelMap[key];
  var td=state.today;td.anrufe++;
  if(key==='termin'){td.termine++;td.erreicht++;}else if(key==='interesse'||key==='kein'){td.erreicht++;}else if(key==='rueckruf'){td.rueckruf++;td.erreicht++;}
  state.callState='idle';state.callSeconds=0;state.held=false;state.currentIndex=(state.currentIndex+1)%leads.length;
  flash('Ergebnis gespeichert: '+labelMap[key],iconMap[key][0],iconMap[key][1]);
  render();
}
window.dpStartCall=dpStartCall;window.dpHangup=dpHangup;window.dpToggleMute=dpToggleMute;window.dpToggleHold=dpToggleHold;window.dpEndCall=dpEndCall;

  }).join('')+'</div>';
}

var scriptsData=[
 {id:'s1',name:'Pflege-Recruiting',icon:'first-aid-kit',subtitle:'Erstansprache von Pflegekräften',sections:[
   {tag:'Begrüßung',text:'Guten Tag, mein Name ist [Name] von [Firma]. Wir vermitteln Pflegekräfte an attraktive Einrichtungen — haben Sie zwei Minuten?'},
   {tag:'Bedarf',text:'Sind Sie aktuell offen für eine neue Position? Was ist Ihnen wichtig: Schichtmodell, Standort oder Gehalt?'},
   {tag:'Einwand',text:'„Ich bin zufrieden." → Verständlich. Viele unserer Kandidaten waren das auch — bis sie gesehen haben, was möglich ist. Darf ich Ihnen unverbindlich zwei Optionen zeigen?'},
   {tag:'Abschluss',text:'Super! Ich schlage ein kurzes Kennenlerngespräch vor. Passt Ihnen Donnerstag 14 Uhr oder lieber Freitag vormittags?'}]},
 {id:'s2',name:'B2B Vertrieb',icon:'megaphone',subtitle:'Outbound an Handwerksbetriebe',sections:[
   {tag:'Begrüßung',text:'Guten Tag Herr/Frau [Name], [Name] von [Firma]. Wir helfen Handwerksbetrieben, mehr qualifizierte Anfragen zu gewinnen.'},
   {tag:'Qualifizierung',text:'Wie gewinnen Sie aktuell neue Kunden? Würden mehr Anfragen für Sie überhaupt Sinn ergeben?'},
   {tag:'Nutzen',text:'Unsere Kunden steigern ihre Anfragen im Schnitt um 30 % — ohne Mehraufwand für Sie.'},
   {tag:'Abschluss',text:'Ich zeige Ihnen das gern in 15 Minuten. Wann passt es besser — Anfang oder Ende der Woche?'}]},
 {id:'s3',name:'Versicherung',icon:'shield-check',subtitle:'Bedarfsanalyse Vorsorge',sections:[
   {tag:'Begrüßung',text:'Guten Tag, [Name] von [Firma]. Wir bieten eine kostenlose Vorsorge-Analyse an.'},
   {tag:'Bedarf',text:'Wann haben Sie Ihre Absicherung zuletzt geprüft? Hat sich Ihre Lebenssituation seitdem verändert?'},
   {tag:'Abschluss',text:'Ein Berater kann das unverbindlich prüfen. Wann erreichen wir Sie am besten?'}]}
];
function renderScripts(){
  var active=scriptsData.filter(function(s){return s.id===state.activeScript;})[0]||scriptsData[0];
  var list=scriptsData.map(function(s){var sel=s.id===state.activeScript;return '<div class="dp-script" data-id="'+s.id+'" style="display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;color:'+(sel?'#0B1437':'#45506E')+';background:'+(sel?'#E6ECFB':'transparent')+';"><i class="ph ph-'+s.icon+'" style="font-size:18px;color:'+(sel?'#2563FF':'#8A93A7')+';"></i><span style="font-size:13.5px;font-weight:600;">'+s.name+'</span></div>';}).join('');
  return '<div style="animation:dp-fade .3s ease both;display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start;"><div style="background:#fff;border:1px solid #E6ECF7;border-radius:16px;padding:14px;"><div style="font-size:12px;font-weight:700;color:#6B7794;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px 10px;">Gesprächsleitfäden</div>'+list+'</div>'+
  '<div style="background:#fff;border:1px solid #E6ECF7;border-radius:16px;padding:26px;"><div style="font-size:18px;font-weight:800;color:#0B1437;margin-bottom:2px;">'+active.name+'</div><div style="font-size:13px;color:#45506E;margin-bottom:22px;">'+active.subtitle+'</div><div style="display:flex;flex-direction:column;gap:16px;">'+
  active.sections.map(function(sec){return '<div style="border-left:3px solid #2563FF;padding:2px 0 2px 16px;"><div style="font-size:11.5px;font-weight:700;color:#2563FF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;">'+sec.tag+'</div><div style="font-size:14.5px;color:#0B1437;line-height:1.55;">'+sec.text+'</div></div>';}).join('')+'</div></div></div>';
}
function wireScripts(){Array.prototype.forEach.call(document.querySelectorAll('.dp-script'),function(el){el.onclick=function(){state.activeScript=el.getAttribute('data-id');render();};});}

function renderSettings(){
  var rows=[{icon:'phone-outgoing',title:'Dialer-Modus',desc:'Vorschau / Power / Predictive',value:'Power'},{icon:'translate',title:'Sprache',desc:'Sprache der Oberfläche',value:'Deutsch'},{icon:'clock',title:'Anrufzeiten',desc:'Erlaubtes Zeitfenster (DSGVO)',value:'08–20 Uhr'},{icon:'phone-disconnect',title:'Wahlwiederholung',desc:'Versuche bei „Nicht erreicht"',value:'3×'},{icon:'shield-check',title:'DSGVO-Einwilligung',desc:'Pflichtfeld vor Erfassung',value:'Aktiv'}];
  return '<div style="animation:dp-fade .3s ease both;max-width:680px;background:#fff;border:1px solid #E6ECF7;border-radius:16px;padding:26px;"><div style="font-size:16px;font-weight:700;color:#0B1437;margin-bottom:4px;">Systemeinstellungen</div><div style="font-size:13px;color:#45506E;margin-bottom:22px;">Dialer- und Team-Konfiguration</div>'+
  rows.map(function(s){return '<div style="display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid #F5F8FF;"><div style="width:40px;height:40px;border-radius:11px;background:#E6ECFB;display:flex;align-items:center;justify-content:center;"><i class="ph ph-'+s.icon+'" style="font-size:19px;color:#2563FF;"></i></div><div style="flex:1;"><div style="font-size:14px;font-weight:700;color:#0B1437;">'+s.title+'</div><div style="font-size:12.5px;color:#45506E;">'+s.desc+'</div></div><div style="font-size:13px;font-weight:600;color:#45506E;background:#F5F8FF;padding:8px 14px;border-radius:9px;">'+s.value+'</div></div>';}).join('')+'</div>';
}

function render(){
  renderNav();
  var t=TITLES[state.view]||['',''];
  document.getElementById('dp-title').textContent=t[0];
  document.getElementById('dp-subtitle').textContent=t[1];
  var main=document.getElementById('dp-main');
  if(state.view==='dashboard')main.innerHTML=renderDashboard();
  else if(state.view==='dialer'){main.innerHTML=renderDialer();wireDialer();}
  else if(state.view==='contacts'){main.innerHTML=renderContacts();wireContacts();}
  else if(state.view==='campaigns')main.innerHTML=renderCampaigns();
  else if(state.view==='appts')main.innerHTML=renderAppts();
  else if(state.view==='reports')main.innerHTML=renderReports();
  else if(state.view==='agents')main.innerHTML=renderAgents();
  else if(state.view==='scripts'){main.innerHTML=renderScripts();wireScripts();}
  else if(state.view==='settings')main.innerHTML=renderSettings();
}
render();
</script>
</body>
</html>
